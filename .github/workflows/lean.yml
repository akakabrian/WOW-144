name: Verify WOWII 144

on:
  push:
    branches:
      - main
      - 'proof/**'
      - 'agent-**'
    paths-ignore:
      - lean-ci.log
  pull_request:
    branches:
      - main
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wow144-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install elan
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve dependencies
        run: lake update

      - name: Restore Formal Conjectures build cache
        uses: actions/cache@v4
        with:
          path: .lake/packages/formal_conjectures/.lake/build
          key: wow144-formal-build-${{ hashFiles('lean-toolchain', 'lakefile.toml') }}

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Verify and capture compiler log
        id: verify
        shell: bash
        run: |
          set +e
          : > lean-ci.log
          status=0

          run_check() {
            printf '$' >> lean-ci.log
            printf ' %q' "$@" >> lean-ci.log
            printf '\n' >> lean-ci.log
            "$@" >> lean-ci.log 2>&1
            rc=$?
            if [ "$rc" -ne 0 ]; then
              status=1
            fi
          }

          run_check lake build FormalConjectures.WrittenOnTheWallII.GraphConjecture144
          run_check lake env lean -DwarningAsError=true WOW144/Audit.lean
          run_check lake env lean -DwarningAsError=true WOW144/Arithmetic.lean
          run_check lake env lean -DwarningAsError=true WOW144/InducedTree.lean
          run_check lake --wfail build WOW144

          echo '$ local sorry/axiom scan' >> lean-ci.log
          grep -RInE '(^|[^[:alnum:]_])(sorry|axiom)([^[:alnum:]_]|$)' \
            WOW144.lean WOW144 >> lean-ci.log 2>&1
          scan_rc=$?
          if [ "$scan_rc" -eq 0 ]; then
            echo 'Local proof artifacts contain a prohibited declaration or placeholder.' >> lean-ci.log
            status=1
          elif [ "$scan_rc" -eq 1 ]; then
            echo 'No prohibited local declarations or placeholders found.' >> lean-ci.log
          else
            echo "Scan command failed with status $scan_rc." >> lean-ci.log
            status=1
          fi

          echo "exit_status=$status" >> "$GITHUB_OUTPUT"
          printf '\nEXIT_STATUS=%s\n' "$status" >> lean-ci.log
          exit 0

      - name: Upload compiler log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-ci-log-${{ github.run_id }}
          path: lean-ci.log

      - name: Publish compiler log
        if: github.event_name == 'push' || github.event_name == 'issues'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f lean-ci.log
          git commit -m "ci: publish Lean compiler log" || true
          if [ "${GITHUB_EVENT_NAME}" = "issues" ]; then
            git push origin HEAD:main
          else
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Fail job when Lean failed
        if: steps.verify.outputs.exit_status != '0'
        run: exit 1
